name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: ✅ Validate package manager
        run: pnpm run validate:pm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type check
        run: pnpm run typecheck

      - name: 🎨 Lint
        run: pnpm run lint

      - name: 🏗️ Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL_PROD }}
        run: pnpm run build

      - name: 🔄 Update repo on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/open_projects/hamutay
            git fetch origin
            git reset --hard origin/main
            echo "✅ Repo updated to $(git log --oneline -1)"

      - name: 📤 Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/,ecosystem.config.js"
          target: "~/open_projects/hamutay/"

      - name: ✅ Files updated on VPS
        run: echo "dist/ and ecosystem.config.js transferred to server"
